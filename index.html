<!DOCTYPE html>
<html lang="zh-TW">
<head>

    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --gold: #ffd700;
            --gold-bg: #fffdf0;
            --silver: #c0c0c0;
            --silver-bg: #f9f9f9;
            --bronze: #cd7f32;
            --bronze-bg: #fffbf5;
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 16px;
            padding-bottom: 60px;
            color: #333;
            line-height: 1.5;
            -webkit-tap-highlight-color: transparent;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            font-size: 1.4rem;
            margin: 4px 0 16px;
        }

        /* 我的卡片庫（可收合） */
        .my-cards-container {
            background: var(--card-bg);
            padding: 12px 15px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 16px;
        }
        .my-cards-title {
            font-size: 0.85rem;
            color: #7f8c8d;
            text-align: center;
            cursor: pointer;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }
        .my-cards-title .arrow { transition: transform .3s; font-size: .7rem; }
        .my-cards-title.open .arrow { transform: rotate(180deg); }
        .card-list {
            display: none;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
        }
        .card-list.open { display: flex; }
        .card-tag {
            background: #eef2f3;
            color: #555;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            border: 1px solid #ddd;
        }
        .card-tag::before { content: '💳'; margin-right: 5px; }

        /* 搜尋框 */
        .search-wrap { position: relative; margin-bottom: 12px; }
        #search {
            width: 100%;
            padding: 14px 40px 14px 16px;
            border-radius: 12px;
            border: 1px solid #ccc;
            font-size: 1.05rem;
            background: #fff;
        }
        #search:focus { outline: none; border-color: var(--accent-color); box-shadow: 0 0 0 3px rgba(52,152,219,.15); }
        .search-wrap .icon { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: #aaa; font-size: 1.1rem; pointer-events: none; }
        .search-wrap .clear { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #999; font-size: 1.2rem; cursor: pointer; display: none; background:#eee; border-radius:50%; width:22px; height:22px; line-height:22px; text-align:center; }

        /* 類別快選 chips */
        .cat-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
        .cat-chip {
            padding: 8px 14px;
            border-radius: 20px;
            border: 1px solid #d5dbdb;
            background: #fff;
            color: #555;
            font-size: 0.9rem;
            cursor: pointer;
            user-select: none;
            transition: all .15s;
        }
        .cat-chip.active { background: var(--primary-color); color: #fff; border-color: var(--primary-color); }

        /* 通路 chips */
        .channel-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
        .channel-chip {
            padding: 9px 14px;
            border-radius: 10px;
            border: 1px solid #dfe6e9;
            background: #fff;
            font-size: 0.92rem;
            cursor: pointer;
            user-select: none;
            transition: all .15s;
        }
        .channel-chip:active { transform: scale(.97); }
        .channel-chip.selected { background: #eaf4fb; border-color: var(--accent-color); color: #21618c; font-weight: 600; }
        .no-match { color: #999; font-size: .9rem; padding: 4px 2px; }

        /* 結果 */
        .result-container { display: flex; flex-direction: column; gap: 14px; }
        .result-head { font-size: .95rem; color:#555; font-weight:600; margin-bottom:-2px; display:flex; align-items:center; gap:6px; flex-wrap:wrap;}
        .result-head .tip { font-weight:400; color:#8e44ad; background:#f5eef8; padding:2px 8px; border-radius:6px; font-size:.8rem; }

        .result-card {
            background: white;
            border-radius: 12px;
            padding: 14px 15px;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid #ddd;

        .rank-1 { border-left-color: var(--gold); background: linear-gradient(to right, var(--gold-bg), #fff); }

        .rank-2 { border-left-color: var(--silver); background: linear-gradient(to right, var(--silver-bg), #fff); }
        .rank-2 .rank-badge { background: var(--silver); color: #555; }
        .rank-3 { border-left-color: var(--bronze); background: linear-gradient(to right, var(--bronze-bg), #fff); }
        .rank-3 .rank-badge { background: var(--bronze); color: white; }
        .rank-other { border-left-color: #95a5a6; }
        .rank-other .rank-badge { background: #95a5a6; color: white; }

        .rank-badge { position: absolute; top: 12px; right: 12px; padding: 4px 8px; border-radius: 4px; font-size: 0.78rem; font-weight: bold; }
        .card-name { font-size: 1.1rem; font-weight: bold; margin-bottom: 4px; color: #2c3e50; padding-right: 76px; }
        .card-name .net { font-size: .72rem; font-weight: 600; color:#7f8c8d; background:#ecf0f1; border-radius:4px; padding:1px 6px; margin-left:6px; vertical-align:middle;}
        .rate { font-size: 1.7rem; font-weight: 800; color: #e74c3c; line-height: 1.1; }
        .netrate { font-size: .82rem; color: #c0392b; margin: 2px 0 6px; }
        .netrate.nofee { color: #16a085; }
        .method { font-size: 0.95rem; color: #34495e; margin-bottom: 6px; }
        .method span { background: #e1f5fe; color: #0277bd; padding: 2px 7px; border-radius: 4px; margin-left: 4px; font-weight: bold; }
        .meta-row { display:flex; flex-wrap:wrap; gap:6px; border-top: 1px solid #eee; padding-top: 8px; margin-top: 4px; }
        .pill { font-size: .78rem; padding: 3px 8px; border-radius: 6px; background:#f4f6f7; color:#566573; }
        .pill strong { color:#c0392b; }
        .exp { font-size:.78rem; padding:3px 8px; border-radius:6px; font-weight:600; }
        .exp.ok { background:#eafaf1; color:#1e8449; }
        .exp.soon { background:#fef5e7; color:#b9770e; }
        .exp.expired { background:#fdedec; color:#c0392b; }
        .exp.caveat { background:#fef9e7; color:#9a7d0a; }

        /* 指定商店 */
        .stores-toggle { display:flex; align-items:center; justify-content:center; gap:6px; margin-top:10px; padding:8px 14px; border:1px dashed #c0a44a; border-radius:8px; background:linear-gradient(135deg,#fffef5,#fef9e7); color:#9a7d0a; font-size:.85rem; font-weight:600; cursor:pointer; user-select:none;}
        .stores-toggle .arrow { transition: transform .3s; }
        .stores-toggle.open .arrow { transform: rotate(180deg); }
        .stores-panel { max-height:0; overflow:hidden; transition:max-height .4s ease; }
        .stores-panel.open { margin-top:10px; }
        .stores-inner { background:#fafafa; border-radius:10px; padding:12px; border:1px solid #eee; }
        .store-group { margin-bottom:10px; } .store-group:last-child{margin-bottom:0;}
        .store-group-label { font-size:.78rem; font-weight:700; color:#555; margin-bottom:5px;}
        .store-chips { display:flex; flex-wrap:wrap; gap:5px; }
        .store-chip { background:#fff; color:#444; padding:3px 9px; border-radius:14px; font-size:.75rem; border:1px solid #ddd; white-space:nowrap;}

        /* 額度監控 */
        .monitor { margin-top: 24px; }
        .monitor-toggle { width:100%; text-align:left; padding:12px 15px; border-radius:12px; border:1px solid #e0e0e0; background:#fff; font-size:.95rem; font-weight:700; color:#2c3e50; cursor:pointer; display:flex; justify-content:space-between; align-items:center;}
        .monitor-toggle .arrow { transition: transform .3s; font-size:.8rem;}
        .monitor-toggle.open .arrow { transform: rotate(180deg);}
        .monitor-body { display:none; margin-top:10px; background:#fff; border-radius:12px; padding:6px 12px 12px; box-shadow:0 2px 8px rgba(0,0,0,.05);}
        .monitor-body.open { display:block; }
        .mcard { border-bottom:1px solid #f0f0f0; padding:11px 2px; }
        .mcard:last-child { border-bottom:none; }
        .mcard-top { display:flex; justify-content:space-between; align-items:baseline; gap:8px;}
        .mcard-name { font-weight:700; color:#2c3e50; font-size:.95rem;}
        .mcard-cap { font-size:.9rem; color:#c0392b; font-weight:700; white-space:nowrap;}
        .mcard-strat { font-size:.8rem; color:#7f8c8d; margin-top:3px; }
        .mcard-badges { margin-top:5px; display:flex; gap:6px; flex-wrap:wrap; }

        .footer-note { margin-top: 28px; font-size: 0.78rem; color: #aaa; text-align: center; line-height:1.7;}
        .footer-note .warn { color:#c0392b; }
    </style>
</head>

        function fmtDate(iso){ return iso ? iso.replace(/-/g,'/') : ''; }
        function capText(cap){ return cap === null ? '無上限' : 'NT$' + cap.toLocaleString(); }

        function expiryBadge(card){
            if(!card.expiry){
                return card.caveat ? `<span class="exp caveat">⚠️ ${card.caveat}</span>` : '';
            }
            const d = new Date(card.expiry + 'T23:59:59');
            const today = new Date(TODAY + 'T00:00:00');
            const days = Math.round((d - today) / 86400000);
            const label = (card.expNote ? card.expNote + ' ' : '') + fmtDate(card.expiry);
            if(days < 0)  return `<span class="exp expired">🔴 已過期（${label}）需確認續辦</span>`;
            if(days <= 31) return `<span class="exp soon">🟠 ${label} 到期（剩 ${days} 天）</span>`;
            return `<span class="exp ok">🟢 有效至 ${label}</span>`;
        }

        /* ---------- 我的卡片庫 ---------- */
        function toggleMyCards(){
            document.getElementById('myCardsList').classList.toggle('open');
            document.getElementById('myCardsToggle').classList.toggle('open');
        }
        (function initMyCards(){
            document.getElementById('myCardsList').innerHTML =
                myCards.map(n => `<div class="card-tag">${n}</div>`).join('');
        })();

        /* ---------- 類別 chips ---------- */
        (function initCatChips(){
            const el = document.getElementById('catChips');
            let html = `<div class="cat-chip active" data-cat="all" onclick="selectCat('all')">全部</div>`;
            html += categories.map(c =>
                `<div class="cat-chip" data-cat="${c.id}" onclick="selectCat('${c.id}')">${c.icon} ${c.name}</div>`).join('');
            el.innerHTML = html;
        })();

        function selectCat(cat){
            activeCat = cat;
            document.querySelectorAll('.cat-chip').forEach(ch =>
                ch.classList.toggle('active', ch.dataset.cat === cat));
            renderChannels();
        }

        /* ---------- 搜尋 ---------- */
        function onSearch(){
            searchText = document.getElementById('search').value.trim().toLowerCase();
            document.getElementById('searchClear').style.display = searchText ? 'block' : 'none';
            document.getElementById('searchIcon').style.display = searchText ? 'none' : 'block';
            renderChannels();
        }
        function clearSearch(){
            document.getElementById('search').value = '';
            onSearch();
        }

        /* ---------- 通路 chips ---------- */
        function channelMatches(ch){
            if(activeCat !== 'all' && ch.cat !== activeCat) return false;
            if(!searchText) return true;
            const hay = (ch.name + ' ' + (ch.kw||[]).join(' ')).toLowerCase();
            return hay.includes(searchText);
        }

        function renderChannels(){
            const list = channels.filter(channelMatches);
            const el = document.getElementById('channelChips');
            if(list.length === 0){
                el.innerHTML = `<div class="no-match">找不到符合「${searchText}」的通路，試試「全家」「淘寶」「日本」…</div>`;
                document.getElementById('resultArea').innerHTML = '';
                return;
            }
            el.innerHTML = list.map(ch => {
                const sel = (ch === selectedChannel) ? ' selected' : '';
                const idx = channels.indexOf(ch);
                return `<div class="channel-chip${sel}" onclick="selectChannel(${idx})">${ch.name}</div>`;
            }).join('');

            // 搜尋只剩一個結果時自動展開，加速查詢
            if(searchText && list.length === 1){
                selectChannel(channels.indexOf(list[0]));
            } else if(selectedChannel && !list.includes(selectedChannel)){
                document.getElementById('resultArea').innerHTML = '';
                selectedChannel = null;
            }
        }

        function selectChannel(idx){
            selectedChannel = channels[idx];
            document.querySelectorAll('.channel-chip').forEach(c => c.classList.remove('selected'));
            renderChannels();
            renderResults(selectedChannel);
            document.getElementById('resultArea').scrollIntoView({behavior:'smooth', block:'nearest'});
        }

        /* ---------- 結果卡片 ---------- */
        function rateBlock(e){
            let html = `<div class="rate">${e.rate}%</div>`;
            if(e.foreign){
                const net = (e.rate - 1.5).toFixed(1);
                html += `<div class="netrate">海外實拿約 <b>${net}%</b>（已扣 1.5% 手續費）</div>`;
            } else if(e.noFee){
                html += `<div class="netrate nofee">✅ 台幣計價・免 1.5% 海外手續費</div>`;
            }
            return html;
        }

        function renderResults(channel){
            const area = document.getElementById('resultArea');
            let head = `<div class="result-head">${channel.name} — 建議刷卡順序`;
            if(channel.tip) head += `<span class="tip">💡 ${channel.tip}</span>`;
            head += `</div>`;

            const cardsHtml = channel.entries.map((e, i) => {
                const card = cards[e.c];
                let rankClass = 'rank-other', rankText = `備案 ${i+1}`;
                if(i===0){ rankClass='rank-1'; rankText='👑 首選'; }
                else if(i===1){ rankClass='rank-2'; rankText='🥈 第二'; }
                else if(i===2){ rankClass='rank-3'; rankText='🥉 第三'; }

                let storesHtml = '';
                if(e.stores){
                    const id = `stores-${i}`;
                    const groups = Object.entries(jpStores).map(([label, shops]) =>
                        `<div class="store-group"><div class="store-group-label">${label}</div>
                         <div class="store-chips">${shops.map(s=>`<span class="store-chip">${s}</span>`).join('')}</div></div>`).join('');
                    storesHtml = `<div class="stores-toggle" onclick="toggleStores('${id}', this)">📋 查看日本指定商店 <span class="arrow">▼</span></div>
                                  <div class="stores-panel" id="${id}"><div class="stores-inner">${groups}</div></div>`;
                }

                return `<div class="result-card ${rankClass}">
                    <div class="rank-badge">${rankText}</div>
                    <div class="card-name">${card.name}<span class="net">${card.net}</span></div>
                    ${rateBlock(e)}
                    <div class="method">支付：<span>${e.m}</span></div>
                    <div class="meta-row">
                        <span class="pill">月刷卡上限 <strong>${capText(card.cap)}</strong></span>
                        ${expiryBadge(card)}
                    </div>
                    ${storesHtml}
                </div>`;
            }).join('');

            area.innerHTML = head + cardsHtml;
        }

        function toggleStores(id, el){
            const panel = document.getElementById(id);
            const open = panel.classList.toggle('open');
            el.classList.toggle('open', open);
            panel.style.maxHeight = open ? panel.scrollHeight + 'px' : '0';
        }

        /* ---------- 額度監控 ---------- */
        function toggleMonitor(){
            document.getElementById('monitorBody').classList.toggle('open');
            document.getElementById('monitorToggle').classList.toggle('open');
        }
        (function initMonitor(){
            // 依月上限由小到大排序，越容易刷爆的越前面
            const order = Object.keys(cards).sort((a,b) => {
                const ca = cards[a].cap === null ? Infinity : cards[a].cap;
                const cb = cards[b].cap === null ? Infinity : cards[b].cap;
                return ca - cb;
            });
            document.getElementById('monitorBody').innerHTML = order.map(k => {
                const c = cards[k];
                return `<div class="mcard">
                    <div class="mcard-top">
                        <span class="mcard-name">${c.name}<span class="net" style="font-size:.7rem;color:#95a5a6;margin-left:5px;">${c.net}</span></span>
                        <span class="mcard-cap">${capText(c.cap)}/月</span>
                    </div>
                    <div class="mcard-strat">${c.strat}</div>
                    <div class="mcard-badges">${expiryBadge(c)}</div>
                </div>`;
            }).join('');
        })();

        /* ---------- 初始 ---------- */
        renderChannels();
    </script>
</body>
</html>
