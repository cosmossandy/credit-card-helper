                    else if (index === 1) { rankClass = 'rank-2'; rankText = '🥈 第二順位'; }
                    else if (index === 2) { rankClass = 'rank-3'; rankText = '🥉 第三順位'; }
                    else { rankText = `備案 ${index + 1}`; } // 第4名以後顯示備案
                    
                    const cardDiv = document.createElement('div');
                    cardDiv.className = `result-card ${rankClass}`;
                    
                    // 組合指定商店 HTML
                    let storesHTML = '';
                    if (item.stores) {
                        const storeId = `stores-${index}`;
                        let groupsHTML = '';
                        for (const [groupLabel, shops] of Object.entries(item.stores)) {
                            const chipsHTML = shops.map(s => `<span class="store-chip">${s}</span>`).join('');
                            groupsHTML += `
                                <div class="store-group">
                                    <div class="store-group-label">${groupLabel}</div>
                                    <div class="store-chips">${chipsHTML}</div>
                                </div>`;
                        }
                        storesHTML = `
                            <div class="stores-toggle" onclick="toggleStores('${storeId}', this)">
                                📋 查看指定日本商店 <span class="arrow">▼</span>
                            </div>
                            <div class="stores-panel" id="${storeId}">
                                <div class="stores-inner">${groupsHTML}</div>
                            </div>`;
                    }

                    cardDiv.innerHTML = `
                        ${rankText ? `<div class="rank-badge">${rankText}</div>` : ''}
                        <div class="card-name">${item.card}</div>
                        <div class="rate">${item.rate}</div>
                        <div class="method">支付：<span>${item.method}</span></div>
                        <div class="limit">⚠️ 上限：<strong>${item.limit}</strong></div>
                        ${storesHTML}
                    `;
                    
                    resultArea.appendChild(cardDiv);
                });
            }
        }
        // 展開/收合指定商店
        function toggleStores(id, toggleEl) {
            const panel = document.getElementById(id);
            const isOpen = panel.classList.toggle('open');
            toggleEl.classList.toggle('open', isOpen);
            if (isOpen) {
                panel.style.maxHeight = panel.scrollHeight + 'px';
            } else {
                panel.style.maxHeight = '0';
            }
        }
    </script>
</body>

</html>
